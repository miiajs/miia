name: Question
description: Ask how to do something with MiiaJS
title: '[question]: '
labels: ['question', 'triage']
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to achieve? Include code if it helps.
    validations:
      required: true
  - type: input
    id: context
    attributes:
      label: Package and runtime
      placeholder: '@miiajs/core 0.2.0, Bun 1.3.x'
