name: Bug report
description: Something in MiiaJS does not work as documented
title: '[bug]: '
labels: ['bug', 'triage']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A small code snippet or a link to a repo that reproduces the issue.
      placeholder: |
        ```ts
        // smallest possible setup that shows the bug
        ```
    validations:
      required: true
  - type: input
    id: package
    attributes:
      label: Affected package(s)
      placeholder: '@miiajs/core 0.2.0'
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime and version
      description: Bun / Deno / Node (+ @miiajs/node-server or @miiajs/uws-server), with versions.
      placeholder: 'Bun 1.3.x on macOS 15'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Error messages, stack traces. Will be rendered as code automatically.
      render: shell
